# Fly.io 配置 —— 一键部署（免费层，常驻不休眠）
# 部署后公网地址固定为 https://<app>.fly.dev
# PUBLIC_URL 已写死成该地址，启动后二维码自动指向公网，无需手动改。
app = "ai-score-live"
primary_region = "hkg"   # 离大陆最近：hkg 香港 / nrt 东京 / sin 新加坡

[build]
  # 项目含 Dockerfile，Fly 会自动用它构建；也可改用下面这行用 Node builder
  # builder = "heroku/nodejs"

[env]
  PORT = "3000"
  PUBLIC_URL = "https://ai-score-live.fly.dev"
  DATA_DIR = "/data"

# 持久卷：评分数据落在卷上，应用重启/重新部署都不会丢分
[mounts]
  source = "ai_score_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # 免费层也保持常驻，扫码随时可用（不自动休眠）
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
